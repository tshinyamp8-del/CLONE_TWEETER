# fly.toml app configuration file generated for clone-tweeter-black-garden-3509 on 2026-05-26T16:32:03+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'clone-tweeter-black-garden-3509'
primary_region = 'jnb'

# 💡 On force AdonisJS à utiliser SQLite sur le volume persistant
[env]
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/data/sqlite.db"
  NODE_ENV = "production"

[deploy]
  release_command = "node ace migration:run --force"

[build]

# ... (le reste de ton fichier reste identique)

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512